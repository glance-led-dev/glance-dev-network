# GDN app manifest (v2). This file is the source of truth for how your app is
# configured and reviewed. Edit it in VS Code or the Studio.
gdn: 1
id: weather-ticker
version: 0.1.0
name: Weather Ticker
author: your-name
description: Two-page weather visual — current conditions + the week ahead.
entry: app.star

# Panel geometry. Height is 32 (fixed); width up to 384.
width: 192
height: 32

# Seconds between re-renders (minimum 60 for public apps).
refresh: 300

# Pages the panel rotates through, in order. app.star must define a function per name.
pages: [current, week]

# What the client fills in at install time.
#   type            — the data type: string | number | choice
#   app_input_type  — the UI widget the client sees. One of:
#                     free-text | dropdown | selection | checkbox | date | date-past | color
#                     (optional; if omitted the form infers it from `type`)
inputs:
  - key: zip
    type: string
    app_input_type: free-text
    label: Zip code
    default: "90210"
    help: US zip; used to look up local weather.
  - key: city
    type: string
    app_input_type: free-text
    label: City label
    default: BEVERLY HILLS
