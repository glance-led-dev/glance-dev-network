gdn: 1
id: local-fires
version: 0.2.0
name: Local Fires
author: glance-led
description: Live wildfire activity and the nearest active fire for a US zip code, from the NIFC interagency feed. No API key required.
category: News
entry: app.star
width: 128
height: 32
refresh: 1800
pages: [status, nearest]
inputs:
  - key: zip
    type: string
    app_input_type: free-text
    label: Zip code
    default: "90210"
    help: A US zip code.
  - key: city
    type: string
    app_input_type: free-text
    label: City label
    default: ""
    help: Leave blank to just show FIRE WATCH.
# Icons you drop in this folder (or assets/) and draw with c.image().
assets:
  - flame.png