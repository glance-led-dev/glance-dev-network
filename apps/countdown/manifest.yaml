gdn: 1
id: countdown
version: 0.1.0
name: Countdown
author: your-name
description: Days remaining until any event.
category: Lifestyle
entry: app.star
width: 128
height: 32
refresh: 3600
pages: [days]
inputs:
  - key: event
    type: string
    app_input_type: free-text
    label: Event name
    default: NEW YEAR
  - key: date
    type: string
    app_input_type: free-text
    label: Target date (YYYY-MM-DD)
    default: "2027-01-01"
