gdn: 1
id: countdown
version: 0.2.0
name: Countdown
author: glance-led
description: Days remaining until any event, with the target date and a color that warms up as it gets close.
category: Lifestyle
entry: app.star
width: 128
height: 32
refresh: 3600
pages: [days]
inputs:
  - key: event
    type: string
    app_input_type: free-text
    label: Event name
    default: NEW YEAR
  - key: date
    type: string
    app_input_type: date
    label: Target date
    default: "2027-01-01"