gdn: 1
id: ported-advice
version: 0.1.0
name: Advice
author: your-name
description: The tidbyt/community "Advice" app, ported to GDN — translated then hand-finished.
category: Lifestyle
entry: app.star

# tronbyt/Pixlet native size.
width: 64
height: 32
refresh: 300

pages: [main]

inputs:
  # schema.Dropdown "Scroll speed" -> choice (kept for fidelity; the GDN port is
  # static so it does not scroll).
  - key: scroll_speed
    type: choice
    app_input_type: dropdown
    label: Scroll speed
    default: Normal
    choices: [Slow, Slower, Normal, Fast, Faster]
