gdn: 1
id: go-gators
version: 0.1.0
name: Go Gators
author: AJ - GLANCE
description: A two-line Gators message board with a logo, in the colors you choose.
category: Lifestyle
entry: app.star
width: 192
height: 32
refresh: 3600
pages: [sign]
inputs:
  - key: line1
    type: string
    app_input_type: free-text
    label: Line 1
    default: GO
  - key: line2
    type: string
    app_input_type: free-text
    label: Line 2 (optional)
    default: GATORS
  - key: color1
    type: string
    app_input_type: color
    label: Line 1 color
    default: "#FA4616"
  - key: color2
    type: string
    app_input_type: color
    label: Line 2 color
    default: "#0021A5"

assets:
  - gator.png
