gdn: 1
id: now-playing
version: 0.1.0
name: Now Playing
author: glance-led
description: The top 5 movies in theaters now, from The Movie Database (TMDB).
category: Entertainment
entry: app.star

# One card per movie; the panel rotates through all five.
width: 128
height: 32
refresh: 3600

# This is a FIVE-PAGE app: one page per movie, and the panel rotates through them
# in order. Page 1 shows `movie_1` (the #1 film), page 2 shows `movie_2`, and so on
# to `movie_5`. Each name below is a function of the same name in app.star.
pages: [movie_1, movie_2, movie_3, movie_4, movie_5]

assets:
  - poster1.png
  - poster2.png
  - poster3.png
  - poster4.png
  - poster5.png

inputs:
  - key: tmdbkey
    type: string
    app_input_type: api-key
    label: TMDB API key
    default: ""
    help: Your themoviedb.org API key. Stored encrypted on the server. Leave blank to show the bundled sample.
  - key: region
    type: choice
    app_input_type: dropdown
    label: Region
    default: US
    choices: [US, GB, CA, AU, DE, FR, IN]
